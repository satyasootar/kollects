services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    container_name: kollects-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.kollects.tech/trpc
      - PORT=3000
    env_file:
      - .env
    networks:
      - kollects-network
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    container_name: kollects-api
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    networks:
      - kollects-network

  caddy:
    image: caddy:2.7-alpine
    restart: unless-stopped
    container_name: kollects-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - kollects-network
    depends_on:
      - web
      - api

volumes:
  caddy_data:
  caddy_config:

networks:
  kollects-network:
    driver: bridge
